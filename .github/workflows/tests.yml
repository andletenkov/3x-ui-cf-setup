name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bats:
    name: Bats unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shellcheck setup_nginx_proxy.sh
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          ignore_paths: 'tests'

      - name: Make setup_nginx_proxy.sh executable
        run: chmod +x setup_nginx_proxy.sh

      - name: Bash syntax check
        run: bash -n setup_nginx_proxy.sh

      - name: Install bats-core
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Make stubs executable
        run: chmod +x tests/stubs/*

      - name: Run tests
        run: bats tests/setup_nginx_proxy.bats
